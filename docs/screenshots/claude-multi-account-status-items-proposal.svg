    <text x="1110" y="302" text-anchor="end" class="pct">32% used</text>
    <rect x="820" y="315" width="290" height="8" rx="4" fill="#383a42"/>
    <rect x="820" y="315" width="93" height="8" rx="4" fill="#d97757"/>
